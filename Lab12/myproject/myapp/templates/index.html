{% extends "base.html" %}
{% block title %}<title>ข้อมูลประชากร</title>{% endblock %}
{% block content %}
  <style>
    h2 { color: #ff69b4; text-align: center; font-size: 2em; margin-bottom: 30px; font-weight: bold; }
    .btn-edit, .btn-delete {
      padding: 8px 16px;
      border-radius: 10px;
      color: white;
      border: none;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-edit {
      background-color: #ff69b4;
    }
    .btn-edit:hover {
      background-color: #ff4fa0;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 105, 180, 0.3);
    }
    .btn-delete {
      background-color: #ff8c00;
    }
    .btn-delete:hover {
      background-color: #ff7700;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 140, 0, 0.3);
    }
  </style>
  <section class="py-5">
    <div class="container">
      <div class="row">
        <div class="col-12">
          <h2>
            <i class="bi bi-people-fill me-2"></i>ข้อมูลประชากร
          </h2>
          <div class="card shadow-sm">
            <div class="card-body p-0" style="max-width: 100%; margin: 0 auto;">
              <div class="table-responsive">
                <table class="table table-hover table-striped mb-0">
                  <thead class="table-primary">
                    <tr>
                      <th scope="col" class="text-center" style="padding: 20px 15px;">รหัสประชากร</th>
                      <th scope="col" style="padding: 20px 15px;">ชื่อประชากร</th>
                      <th scope="col" class="text-center" style="padding: 20px 15px;">อายุ</th>
                      <th scope="col" style="padding: 20px 15px;">วันที่เพิ่มข้อมูล</th>
                      <th scope="col" class="text-center" style="padding: 20px 15px;">แก้ไข</th>
                      <th scope="col" class="text-center" style="padding: 20px 15px;">ลบ</th>
                    </tr>
                  </thead>
                  <tbody>
                    {% for person in all_Person %}
                      <tr>
                        <td class="text-center" style="padding: 18px 15px;">{{ person.id }}</td>
                        <td style="padding: 18px 15px;">{{ person.name }}</td>
                        <td class="text-center" style="padding: 18px 15px;">{{ person.age }}</td>
                        <td style="padding: 18px 15px;">{{ person.date }}</td>
                        <td class="text-center" style="padding: 18px 15px;">
                          <a href="/form/{{ person.id }}/" class="btn-edit">
                            <i class="bi bi-pencil-square"></i> แก้ไข
                          </a>
                        </td>
                        <td class="text-center" style="padding: 18px 15px;">
                          <a href="/delete/{{ person.id }}/"
                             class="btn-delete"
                             onclick="return confirm('คุณต้องการลบข้อมูล {{ person.name }} หรือไม่?')">
                            <i class="bi bi-trash"></i> ลบ
                          </a>
                        </td>
                      </tr>
                    {% endfor %}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
