<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Site{% endblock %}</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive; background: linear-gradient(to bottom, #ffb3ba, #ffdfba); margin: 0; padding: 0; }
        header { background: linear-gradient(to right, #ff69b4, #ffb6c1); color: white; padding: 1rem; text-align: center; border-radius: 0 0 20px 20px; }
        nav { margin-top: 10px; }
        nav a { color: #fff; text-decoration: none; margin: 0 15px; background: #87ceeb; padding: 5px 10px; border-radius: 10px; }
        main { padding: 20px; max-width: 800px; margin: 20px auto; background: rgba(255,255,255,0.9); min-height: 400px; border-radius: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        footer { background: #ff69b4; color: white; text-align: center; padding: 10px; border-radius: 20px 20px 0 0; }
    </style>
</head>
<body>
    <header>
        <h1>🐱 My Cat Site 🐱</h1>
        <nav>
            <a href="/">🏠 Home</a>
            <a href="/about">🐾 About</a>
            <a href="/form">📝 Form</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy; 2024</p>
    </footer>
</body>
</html>
